<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASCII Art Generator</title>
<link href="https://cdn.jsdelivr.net/npm/@fontsource/roboto-mono@5/400.css" rel="stylesheet">
<style>
:root{--red:#FF1A1A;--bg:#0A0A0A;--bg1:#111;--bg2:#161616;--bg3:#1C1C1C;--bd:#222;--bd2:#2A2A2A;--tx:#888;--tx2:#444;--tx3:#2A2A2A;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
.app{display:grid;grid-template-rows:40px 1fr 88px;grid-template-columns:200px 1fr;height:100vh;font-family:'Roboto Mono',monospace;background:var(--bg);}
.hdr{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:0 16px;background:#080808;border-bottom:1px solid var(--bd);z-index:10;}
.hmark{width:3px;height:18px;background:var(--red);flex-shrink:0;}
.htitle{font-size:8px;letter-spacing:.26em;color:var(--red);flex:1;}
.hbtn{font-family:'Roboto Mono',monospace;font-size:7px;letter-spacing:.14em;padding:5px 12px;border:1px solid var(--bd2);background:none;color:var(--tx2);cursor:pointer;transition:all .12s;}
.hbtn:hover{border-color:var(--red);color:var(--red);}
.hbtn.ok{background:var(--red);color:#000;border-color:var(--red);}
.sidebar{grid-row:2/3;border-right:1px solid var(--bd);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent;background:var(--bg1);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--bd2);}
.cat-hdr{font-size:6px;letter-spacing:.22em;color:var(--tx3);padding:11px 12px 5px;position:sticky;top:0;background:var(--bg1);z-index:1;}
.tbtn{display:block;width:100%;text-align:left;font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:.04em;padding:8px 14px;border:none;background:none;color:var(--tx2);cursor:pointer;transition:all .1s;border-left:2px solid transparent;}
.tbtn:hover{color:var(--tx);background:var(--bg2);}
.tbtn.on{color:var(--red);border-left-color:var(--red);background:var(--bg3);}
.canvas{grid-row:2/3;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:background .2s;}
.fsbar{position:absolute;top:12px;right:16px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.75);padding:6px 12px;border:1px solid var(--bd);}
.fslbl{font-size:7px;letter-spacing:.14em;color:var(--tx3);}
.fsbar input[type=range]{width:90px;accent-color:var(--red);}
.fsval{font-size:8px;color:var(--tx2);min-width:28px;font-family:'Roboto Mono',monospace;}
pre.art{font-family:'Roboto Mono','Courier New',monospace;font-weight:400;line-height:1.3;white-space:pre;transition:color .15s;}
.ctrl{grid-column:1/-1;border-top:1px solid var(--bd);background:#080808;display:grid;grid-template-columns:1fr 1fr 110px 110px auto auto auto auto;align-items:stretch;}
.ci{border-right:1px solid var(--bd);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;gap:5px;}
.lbl{font-size:6px;letter-spacing:.2em;color:var(--tx3);}
input[type=text]{font-family:'Roboto Mono',monospace;font-size:10px;padding:5px 7px;border:1px solid var(--bd2);background:var(--bg2);color:var(--tx);width:100%;outline:none;}
input[type=text]:focus{border-color:var(--red);color:#aaa;}
input[type=text]::placeholder{color:var(--tx3);}
.slrow{display:flex;gap:6px;align-items:center;}
.slrow input[type=range]{flex:1;accent-color:var(--red);}
.slv{font-size:8px;color:var(--tx3);min-width:24px;text-align:right;font-family:'Roboto Mono',monospace;}
.crow{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.csw{width:14px;height:14px;cursor:pointer;border:1px solid var(--bd2);position:relative;overflow:hidden;flex-shrink:0;}
.csw input[type=color]{position:absolute;inset:-4px;width:140%;height:140%;opacity:0;cursor:pointer;}
.chex{font-size:8px;color:var(--tx3);min-width:52px;font-family:'Roboto Mono',monospace;}
.cdot{width:11px;height:11px;cursor:pointer;border:1px solid transparent;transition:transform .1s;flex-shrink:0;}
.cdot:hover{transform:scale(1.3);}
.cdot.on{border:1px solid var(--red);}
.abtn{font-family:'Roboto Mono',monospace;font-size:7px;letter-spacing:.1em;padding:0 14px;border:none;border-left:1px solid var(--bd);background:none;color:var(--tx2);cursor:pointer;transition:all .12s;height:100%;white-space:nowrap;}
.abtn:hover{color:var(--red);}
.abtn.ok{background:var(--red);color:#000;}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hmark"></div>
    <span class="htitle">BOOTHCLUB ASCII STUDIO</span>
    <button class="hbtn" id="invBtn">INVERT</button>
    <button class="hbtn" id="cpyBtn">COPY ASCII</button>
    <button class="hbtn" id="svgBtn">EXPORT SVG</button>
  </div>
  <div class="sidebar" id="sidebar"></div>
  <div class="canvas" id="canvas">
    <div class="fsbar">
      <span class="fslbl">SIZE</span>
      <input type="range" id="szR" min="6" max="32" value="13" step="1"/>
      <span class="fsval" id="szV">13px</span>
    </div>
    <pre class="art" id="art"></pre>
  </div>
  <div class="ctrl">
    <div class="ci"><span class="lbl">TEXT / LABEL</span><input type="text" id="t1" placeholder="BOOTHCLUB"/></div>
    <div class="ci"><span class="lbl">SUBTEXT / COUNT</span><input type="text" id="t2" placeholder="AMSTERDAM"/></div>
    <div class="ci"><span class="lbl">CHAR SPACING</span><div class="slrow"><input type="range" id="spR" min="0" max="14" value="0" step=".5"/><span class="slv" id="spV">0px</span></div></div>
    <div class="ci"><span class="lbl">LINE HEIGHT</span><div class="slrow"><input type="range" id="lhR" min="1" max="2.5" value="1.3" step=".05"/><span class="slv" id="lhV">1.30</span></div></div>
    <div class="ci">
      <span class="lbl">BACKGROUND</span>
      <div class="crow"><div class="csw" id="bgSw"><input type="color" id="bgC" value="#000000"/></div><span class="chex" id="bgH">#000000</span><div id="bgD" style="display:flex;gap:3px;"></div></div>
    </div>
    <div class="ci">
      <span class="lbl">ART COLOR</span>
      <div class="crow"><div class="csw" id="artSw"><input type="color" id="artC" value="#FF1A1A"/></div><span class="chex" id="artH">#FF1A1A</span><div id="artD" style="display:flex;gap:3px;"></div></div>
    </div>
    <button class="abtn" id="invBtn2">INVERT</button>
    <button class="abtn" id="cpyBtn2">COPY</button>
  </div>
</div>
<script>
const CATS=[
  {label:'PHOTO BOOTH',  keys:['booth_machine','booth_open','coin_slot','ticket','contact_sheet']},

  {label:'FRIENDS & FUN',keys:['two_people','cheers','confetti','burst','balloon','trophy','polaroid_friends','memories']},
  {label:'MOOD',         keys:['smiley','wink','cool','surprised','fun','say','speech_wave','party']},

  hands:{l:'HANDS',g:()=>[

    ' \\  \\  \\--/  /  / ',
    '  \\  \\      /  /  ',
    '   \\  \\    /  /   ',

  xoxo:{l:'XOXO',g:(a)=>{

      '  \\/  ( )  \\/  ( ) ',

  balloon:{l:'BALLOON',g:(a)=>{
    const txt=(a||':-)').toUpperCase().slice(0,5).padEnd(5);

      '   \\  ~~~~~  /   ',

  trophy:{l:'TROPHY',g:()=>[

    '\\  | [-------] |  /',

    '   [----| |----]   ',
    '   [====| |====]   ',
    '   [----| |----]   ',
    '  /=============\\  ',
  ].join('\n')},
  polaroid_friends:{l:'POLAROID+',g:(a)=>{
    const n=(a||'MEMORIES').toUpperCase().slice(0,12).padEnd(14);
    return[
      ' /------------------\\ ',
      ' |                  | ',
      ' | ( o )     ( o )  | ',
      ' |   \\         /    | ',
      ' |    \\  :-D  /     | ',
      ' |     \\     /      | ',
      ' |      \\---/       | ',

  memories:{l:'MEMORIES',g:()=>[

  cool:{l:'COOL 8-)',g:()=>[

    '     / [===] [===] \\     ',
    '    /  | 8 | | ) |  \\    ',
    '   / --[===]-[===]-- \\   ',
    '  /                   \\  ',
    ' |     ~~~~~~~~~~~     | ',
    ' |        ---          | ',
    '  \\                   /  ',

  surprised:{l:'SURPRISE',g:()=>[
    '   /=========\\   ',
    '  /  O     O  \\  ',
    ' /   |     |   \\ ',
    '|    |     |    |',
    '|                |',
    '|     /---\\      |',
    '|    /     \\     |',
    ' \\  /       \\   /',
    '  \\/         \\ /',
    '   \\---------/   ',
  ].join('\n')},
  fun:{l:'FUN',g:(a)=>{
    const txt=(a||'FUN!').toUpperCase();
    const r1='- \\ / - \\ / - \\ /';
    const r2='\\ - / \\ - / \\ - /';
    const r3='/ \\ - / \\ - / \\ -';
    const label='[ '+txt+' ]';
    const pad=' '.repeat(Math.max(0,Math.floor((r1.length-label.length)/2)));
    return[r1,r2,r3,pad+label,r1,r2,r3].join('\n');

  say:{l:'SAY!',g:(a,b)=>{
    const l1=(a||'SAY CHEESE!').toUpperCase();
    const l2=(b||':-) :-) :-)').toUpperCase();
    const w=Math.max(l1.length,l2.length)+2;
    const p=s=>s+' '.repeat(Math.max(0,w-s.length));
    return[
      '/'+'-'.repeat(w+2)+'\\',
      '| '+p(l1)+' |',
      '| '+p(l2)+' |',
      '| '+' '.repeat(w)+' |',
      '\\--\\'+' '.repeat(w)+'/',
      '   \\'+ '-'.repeat(w)+'/',
    ].join('\n');
  }},
  speech_wave:{l:'SPEECH ~',g:(a)=>{
    const txt=(a||'SMILE!').toUpperCase();
    const w=Math.max(txt.length+4,14);
    const top='~'.repeat(w);
    const mid='~ '+txt.padEnd(w-3)+'~';
    return[top,mid,top,'    \\','     ~~~'].join('\n');

  party:{l:'PARTY',g:()=>[
    '  *  .  *  .  *  .  *  ',
    '.  /\\  *  /\\  *  /\\  . ',
    ' /  \\  . /  \\  ./  \\   ',
    '/ ** \\ / /\\  \\ / ** \\  ',
    '\\    / / \\/  \\/ \\   /  ',
    ' \\--/ /--------\\ \\-/   ',
    '     /  PARTY!  \\       ',
    '    /============\\      ',
  ].join('\n')},
  stamp:{l:'STAMP',g:(a,b)=>{
    const name=(a||'BOOTHCLUB').toUpperCase();
    const inner=(b||':-)').toUpperCase();
    const w=24;
    let ring='';const seg=name+' - ';
    while(ring.length<w)ring+=seg;
    ring=ring.slice(0,w);
    const rev=ring.split('').reverse().join('');
    const pad=Math.max(0,Math.floor((w-inner.length)/2));
    return[
      ' '+ring+' ',
      '/'+' '.repeat(w+2)+'\\',
      '|  '+' '.repeat(pad)+inner+' '.repeat(Math.max(0,w-pad-inner.length))+'  |',
      '\\'+' '.repeat(w+2)+'/',
      ' '+rev+' ',
    ].join('\n');
  }},
  frame:{l:'FRAME',g:(a,b)=>{
    const t=(a||'BOOTHCLUB').toUpperCase();
    const s=(b||'AMSTERDAM').toUpperCase();
    const iW=Math.max(t.length,s.length)+4;
    const hbar='[--]'+'-'.repeat(Math.max(0,iW-6))+'[--]';
    const p=str=>{const sp=Math.max(0,iW-str.length);return ' '.repeat(Math.floor(sp/2))+str+' '.repeat(Math.ceil(sp/2));};
    return[
      '/'+hbar+'\\',
      '| '+p(t)+' |',
      '| '+'-'.repeat(iW)+' |',
      '| '+p(s)+' |',
      '\\'+hbar+'/',
    ].join('\n');
  }},
  poses:{l:'POSES',g:(a)=>{
    const raw=a||'WINK\nKISS\nPOSE';
    const lines=raw.replace(/\\n/gi,'\n').split('\n');
    const r=[];
    lines.forEach((l,i)=>{r.push('  '+l.toUpperCase());if(i<lines.length-1)r.push('  ---');});
    return r.join('\n');

  url:{l:'URL BADGE',g:(a)=>{
    const txt=(a||'BOOTHCLUB.NL').toUpperCase();
    const bar='='.repeat(txt.length+4);
    return['['+bar+']','[  '+txt+'  ]','['+bar+']'].join('\n');

  bca:{l:'BCA SEAL',g:(a)=>{
    const txt=(a||'BCA').toUpperCase();
    const pad=Math.max(0,Math.floor((9-txt.length)/2));
    return[
      '   |   |   |   ',
      ' -           - ',
      '/             \\',
      '|  '+' '.repeat(pad)+txt+' '.repeat(Math.max(0,9-pad-txt.length))+'  |',
      '\\             /',
      ' -           - ',
      '   |   |   |   ',
    ].join('\n');
  }},
  ticket_brand:{l:'TICKET STUB',g:(a,b)=>{
    const t=(a||'BOOTHCLUB').toUpperCase().padEnd(28);
    const s=(b||'ADMIT ONE').toUpperCase().padEnd(28);
    return[
      '/================================\\',
      '| [=] [=] [=] [=] [=] [=] [=]  |',
      '|--------------------------------|',
      '|  '+t+'  |',
      '|  '+s+'  |',
      '|--------------------------------|',
      '| [=] [=] [=] [=] [=] [=] [=]  |',
      '\\================================/',

  smiley_row:{l:'SMILEY ROW',g:(a)=>{
    const n=Math.min(Math.max(parseInt(a)||5,1),9);
    return'( '+Array(n).fill(':-)').join(' ')+' )';
  }},
  custom:{l:'CUSTOM',g:(a,b)=>{
    const m=(a||'YOUR TEXT').toUpperCase();
    const s=b?b.toUpperCase():null;
    const w=Math.max(m.length,s?s.length:0)+2;
    const d='-'.repeat(w);
    const p=str=>{const sp=w-str.length;const l=Math.floor(sp/2);return ' '.repeat(l)+str+' '.repeat(sp-l);};
    const lines=['/'+d+'\\','| '+p(m)+' |'];
    if(s){lines.push('| '+d+' |');lines.push('| '+p(s)+' |');}
    lines.push('\\'+d+'/');
    return lines.join('\n');
  }},

const BG_P=['#000000','#0A0A0A','#111111','#FFFFFF','#FF1A1A','#FFE600','#001AFF','#1A1A2E'];
const ART_P=['#FF1A1A','#FFFFFF','#FFE600','#000000','#FF6600','#AAAAAA','#00FF88','#001AFF'];
let S={tpl:'booth_machine',t1:'',t2:'',bg:'#000000',art:'#FF1A1A',sz:13,sp:0,lh:1.3};

function getArt(){const tpl=T[S.tpl];return tpl?tpl.g(S.t1||null,S.t2||null):'';}
function render(){
  const el=document.getElementById('art');
  el.style.fontSize=S.sz+'px';
  el.style.letterSpacing=S.sp+'px';
  el.style.lineHeight=S.lh;
  el.style.color=S.art;
  document.getElementById('canvas').style.background=S.bg;
  el.textContent=getArt();
}

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  CATS.forEach(cat=>{
    const hdr=document.createElement('div');
    hdr.className='cat-hdr';hdr.textContent=cat.label;sb.appendChild(hdr);
    cat.keys.forEach(k=>{
      if(!T[k])return;
      const btn=document.createElement('button');
      btn.className='tbtn'+(k===S.tpl?' on':'');
      btn.textContent=T[k].l;btn.dataset.k=k;
      btn.onclick=()=>{
        S.tpl=k;
        document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('on',b.dataset.k===k));
        render();
      };
      sb.appendChild(btn);
    });
  });
}

function buildColor(inputId,hexId,swId,dotsId,presets,key){
  const input=document.getElementById(inputId);
  const hexEl=document.getElementById(hexId);
  const sw=document.getElementById(swId);
  sw.style.background=input.value;
  input.oninput=()=>{sw.style.background=input.value;hexEl.textContent=input.value;S[key]=input.value;render();refreshDots(dotsId,presets,input.value);};
  const dotsEl=document.getElementById(dotsId);
  presets.forEach(col=>{
    const d=document.createElement('div');
    d.className='cdot'+(col===S[key]?' on':'');
    d.style.background=col;
    if(col==='#FFFFFF'||col==='#FFE600')d.style.outline='1px solid #333';
    d.onclick=()=>{input.value=col;sw.style.background=col;hexEl.textContent=col;S[key]=col;render();refreshDots(dotsId,presets,col);};
    dotsEl.appendChild(d);
  });
}

function refreshDots(id,presets,val){
  document.querySelectorAll('#'+id+' .cdot').forEach((d,i)=>{d.classList.toggle('on',presets[i]===val);});
}

function doInvert(){
  const tmp=S.bg;S.bg=S.art;S.art=tmp;
  ['bgC','artC'].forEach((id,i)=>{
    const v=i===0?S.bg:S.art;
    document.getElementById(id).value=v;
    document.getElementById(id==='bgC'?'bgH':'artH').textContent=v;
    document.getElementById(id==='bgC'?'bgSw':'artSw').style.background=v;
  });
  refreshDots('bgD',BG_P,S.bg);refreshDots('artD',ART_P,S.art);render();
}

function doCopy(btn){
  navigator.clipboard.writeText(getArt()).then(()=>{
    const t=btn.textContent;btn.textContent='COPIED!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent=t;btn.classList.remove('ok');},1400);
  });
}

function doSvg(){
  const art=getArt();
  const lines=art.split('\n');
  const charW=(S.sz*0.601)+S.sp;
  const lineH=S.sz*S.lh;
  const maxLen=Math.max(...lines.map(l=>l.length));
  const px=24,py=24;
  const W=Math.round(maxLen*charW+px*2);
  const H=Math.round(lines.length*lineH+py*2);
  const tl=lines.map((l,i)=>{
    const esc=l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return`<text x="${px}" y="${Math.round(py+(i+1)*lineH-lineH*.22)}">${esc}</text>`;
  }).join('\n');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="${S.bg}"/><g font-family="'Roboto Mono','Courier New',monospace" font-size="${S.sz}" fill="${S.art}" letter-spacing="${S.sp}" xml:space="preserve" font-weight="400">\n${tl}\n</g></svg>`;
  const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  const a=document.createElement('a');a.href=url;a.download='boothclub-ascii.svg';a.click();URL.revokeObjectURL(url);
}

buildSidebar();
buildColor('bgC','bgH','bgSw','bgD',BG_P,'bg');
buildColor('artC','artH','artSw','artD',ART_P,'art');
document.getElementById('t1').oninput=e=>{S.t1=e.target.value;render();};
document.getElementById('t2').oninput=e=>{S.t2=e.target.value;render();};
document.getElementById('szR').oninput=e=>{S.sz=parseInt(e.target.value);document.getElementById('szV').textContent=S.sz+'px';render();};
document.getElementById('spR').oninput=e=>{S.sp=parseFloat(e.target.value);document.getElementById('spV').textContent=S.sp+'px';render();};
document.getElementById('lhR').oninput=e=>{S.lh=parseFloat(e.target.value);document.getElementById('lhV').textContent=parseFloat(e.target.value).toFixed(2);render();};
document.getElementById('invBtn').onclick=doInvert;
document.getElementById('invBtn2').onclick=doInvert;
document.getElementById('cpyBtn').onclick=function(){doCopy(this);};
document.getElementById('cpyBtn2').onclick=function(){doCopy(this);};
document.getElementById('svgBtn').onclick=doSvg;
render();
</script>
