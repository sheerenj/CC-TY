<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC-TY — Visual Coding Tools</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f2f2f2;
      --panel: #ffffff;
      --panel-hover: #f7f7f7;
      --stroke: #d9d9d9;
      --stroke-strong: #bcbcbc;
      --text: #111111;
      --text-soft: #6a6a6a;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
      --max-width: 1440px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .shell {
      width: min(var(--max-width), calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .hero {
      margin-bottom: 24px;
      padding: 24px 28px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.95;
      font-weight: 700;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.7;
    }

    .status {
      margin: 20px 0 0;
      color: var(--text-soft);
      font-size: 12px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      grid-column: span 4;
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .tool-card:hover {
      transform: translateY(-3px);
      border-color: var(--stroke-strong);
      background: var(--panel-hover);
    }

    .thumb-wrap {
      aspect-ratio: 16 / 10;
      margin: 14px 14px 0;
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: #ececec;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--text-soft);
      font-size: 12px;
      padding: 16px;
      text-align: center;
    }

    .card-body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tool-name {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      font-weight: 500;
      color: var(--text);
    }

    .tool-meta {
      color: var(--text-soft);
      font-size: 11px;
      line-height: 1.4;
    }

    .footer-note {
      margin-top: 22px;
      padding: 14px 16px;
      border: 1px solid var(--stroke);
      border-radius: 18px;
      background: var(--panel);
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.7;
    }

    .hidden { display: none; }

    @media (max-width: 1100px) {
      .tool-card { grid-column: span 6; }
    }

    @media (max-width: 700px) {
      .shell {
        width: min(var(--max-width), calc(100% - 24px));
        padding-top: 18px;
      }

      .hero { padding: 20px; }
      .gallery { gap: 14px; }
      .tool-card { grid-column: span 12; }
      .thumb-wrap { margin: 12px 12px 0; }
      .card-body { padding: 14px 16px 16px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Visual Coding Tools</div>
      <h1>CC-TY</h1>
      <p class="lead">
        A live gallery of generators, scripts, image tools, typography tools, and visual experiments.
      </p>
      <p class="status" id="status">Loading tools…</p>
    </section>

    <section class="gallery" id="gallery"></section>

    <div class="footer-note">
      To show a thumbnail, place a file named <strong>preview.png</strong> inside a tool folder.
      Every folder containing an <strong>index.html</strong> will be listed automatically.
    </div>
  </main>

  <script>
    const OWNER = "sheerenj";
    const REPO = "CC-TY";
    const BRANCH = "main";
    const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}/contents/tools`;
    const SITE_BASE = `https://${OWNER}.github.io/${REPO}/tools`;

    const gallery = document.getElementById("gallery");
    const statusEl = document.getElementById("status");

    function prettifyName(slug) {
      return slug
        .replace(/[-_]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function titleCase(str) {
      return str.replace(/\b\w/g, char => char.toUpperCase());
    }

    async function fetchJson(url) {
      const res = await fetch(url, {
        headers: { "Accept": "application/vnd.github+json" }
      });
      if (!res.ok) {
        throw new Error(`GitHub API error: ${res.status}`);
      }
      return res.json();
    }

    async function getCategories() {
      return fetchJson(API_BASE);
    }

    async function getToolsInCategory(categoryName) {
      return fetchJson(`${API_BASE}/${encodeURIComponent(categoryName)}`);
    }

    async function folderHasIndex(categoryName, toolName) {
      try {
        const files = await fetchJson(`${API_BASE}/${encodeURIComponent(categoryName)}/${encodeURIComponent(toolName)}`);
        return files.some(file => file.type === "file" && file.name.toLowerCase() === "index.html");
      } catch {
        return false;
      }
    }

    async function folderHasPreview(categoryName, toolName) {
      try {
        const files = await fetchJson(`${API_BASE}/${encodeURIComponent(categoryName)}/${encodeURIComponent(toolName)}`);
        return files.some(file => file.type === "file" && file.name.toLowerCase() === "preview.png");
      } catch {
        return false;
      }
    }

    function makeCard({ category, slug, hasPreview }) {
      const link = `${SITE_BASE}/${category}/${slug}/`;
      const preview = `${SITE_BASE}/${category}/${slug}/preview.png`;

      const card = document.createElement("a");
      card.className = "tool-card";
      card.href = link;
      card.target = "_blank";
      card.rel = "noopener noreferrer";

      card.innerHTML = `
        <div class="thumb-wrap">
          ${
            hasPreview
              ? `<img src="${preview}" alt="${titleCase(prettifyName(slug))} preview" onerror="this.remove(); this.nextElementSibling.classList.remove('hidden');">`
              : ``
          }
          <div class="thumb-fallback ${hasPreview ? "hidden" : ""}">No Preview Yet</div>
        </div>
        <div class="card-body">
          <h2 class="tool-name">${titleCase(prettifyName(slug))}</h2>
          <div class="tool-meta">${titleCase(prettifyName(category))}</div>
        </div>
      `;

      return card;
    }

    async function loadGallery() {
      try {
        const categories = await getCategories();
        const categoryFolders = categories.filter(item => item.type === "dir");

        const tools = [];

        for (const category of categoryFolders) {
          const items = await getToolsInCategory(category.name);
          const toolFolders = items.filter(item => item.type === "dir");

          for (const tool of toolFolders) {
            const hasIndex = await folderHasIndex(category.name, tool.name);
            if (!hasIndex) continue;

            const hasPreview = await folderHasPreview(category.name, tool.name);

            tools.push({
              category: category.name,
              slug: tool.name,
              hasPreview
            });
          }
        }

        tools.sort((a, b) => a.slug.localeCompare(b.slug));

        gallery.innerHTML = "";
        tools.forEach(tool => gallery.appendChild(makeCard(tool)));

        statusEl.textContent = `${tools.length} tools loaded`;
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Could not load tools from GitHub";
      }
    }

    loadGallery();
  </script>
</body>
</html>
